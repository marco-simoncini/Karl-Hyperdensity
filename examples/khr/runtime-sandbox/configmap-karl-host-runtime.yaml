apiVersion: v1
kind: ConfigMap
metadata:
  name: karl-host-runtime-config
  namespace: khr-runtime-sandbox
  labels:
    khr.karl.io/sandbox: "true"
data:
  karl-host-runtime.yaml: |
    apiVersion: khr.karl.io/v1alpha1
    kind: KarlHostRuntimeConfig
    metadata:
      name: karl-host-runtime-metal-sandbox
    spec:
      hostId: karl-host-runtime-karl-metal-01
      linuxOnly: true
      sandboxMode: true
      sandboxApplyEnabled: false
      allowedNamespaces:
        - khr-runtime-sandbox
      allowedLabels:
        khr.karl.io/sandbox: "true"
      cgroupRoot: /sys/fs/cgroup
      allowPathPrefixes:
        - /sys/fs/cgroup/karl.slice
