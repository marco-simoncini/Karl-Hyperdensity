apiVersion: apps/v1
kind: Deployment
metadata:
  name: khr-native-live-target
  namespace: khr-runtime-sandbox
  labels:
    khr.karl.io/sandbox: "true"
    khr.karl.io/native-live: "true"
    app: khr-native-live-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: khr-native-live-target
  template:
    metadata:
      labels:
        app: khr-native-live-target
        khr.karl.io/sandbox: "true"
        khr.karl.io/native-live: "true"
    spec:
      containers:
        - name: target
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
