apiVersion: apps/v1
kind: Deployment
metadata:
  name: khr-runtime-linux-target
  namespace: khr-runtime-sandbox
  labels:
    khr.karl.io/sandbox: "true"
    app: khr-runtime-linux-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: khr-runtime-linux-target
  template:
    metadata:
      labels:
        app: khr-runtime-linux-target
        khr.karl.io/sandbox: "true"
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
