apiVersion: khr.karl.io/v1alpha1
kind: KarlHostRuntimeConfig
metadata:
  name: karl-host-runtime-tp-live-scope1
  annotations:
    khr.karl.io/hostRuntimeEnabled: "true"
    khr.karl.io/scope: "tp-live-scope1"
spec:
  hostId: karl-host-runtime-karl-metal-01-scope1
  linuxOnly: true
  sandboxMode: true
  sandboxApplyEnabled: false
  resourcePortLoopEnabled: false
  laneDiscoveryEnabled: false
  resourceFutureSimulationEnabled: false
  allowedNamespaces:
    - khr-runtime-sandbox
  allowedLabels:
    khr.karl.io/sandbox: "true"
  cgroupRoot: /sys/fs/cgroup
  allowPathPrefixes:
    - /sys/fs/cgroup/karl.slice
