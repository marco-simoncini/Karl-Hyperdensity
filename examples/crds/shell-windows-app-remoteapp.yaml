---
apiVersion: runtime.karl.io/v1alpha1
kind: ResourcePort
metadata:
  name: windows-app-envelope-example
spec:
  description: Windows session/app CPU and RAM envelope (no per-session vCPU hotplug claim).
  appliesToRuntimeProviderIds:
    - windows-host-agent.v1
  ports:
    cpu:
      modes:
        - envelope
        - static
    memory:
      modes:
        - envelope
        - static
    disk:
      modes:
        - static
    network:
      modes:
        - static
---
apiVersion: runtime.karl.io/v1alpha1
kind: RuntimeProvider
metadata:
  name: windows-host-agent-v1
spec:
  id: windows-host-agent.v1
  displayName: Windows Host Agent (kubelet analog for Windows Shells)
  driver: windows-host-agent
  supportedShellClassIds:
    - windows.app.remoteapp.v1
  defaultResourcePortProfileRef:
    name: windows-app-envelope-example
  execContractVersion: khr-contract-2026.05-sprint2
---
apiVersion: runtime.karl.io/v1alpha1
kind: ShellClass
metadata:
  name: windows-app-remoteapp
spec:
  id: windows.app.remoteapp.v1
  displayName: Windows published application (RemoteApp-style)
  complianceFamily: windows.app
  supportedRuntimeProviders:
    - windows-host-agent.v1
  defaultResourcePortProfileRef:
    name: windows-app-envelope-example
---
apiVersion: runtime.karl.io/v1alpha1
kind: Shell
metadata:
  name: claims-calc-remoteapp
  namespace: karl-sandbox
spec:
  shellClassRef:
    name: windows-app-remoteapp
  shellPoolRef:
    name: pool-windows-finance-example
  displayName: Claims calculator (RemoteApp)
  resourceProfile:
    cpuMillis: 2000
    memoryMi: 8192
  runtimePreference:
    primaryProvider: windows-host-agent.v1
  windowsAppRef:
    name: claims-calc-demo
  gatewayRouteRefs:
    - name: claims-calc-remoteapp-route
