apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperdensity-controller
  namespace: karl-system
  labels:
    app.kubernetes.io/name: hyperdensity-controller
    reference_only: "true"
    not_production_install: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hyperdensity-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hyperdensity-controller
    spec:
      serviceAccountName: hyperdensity-controller
      containers:
        - name: controller
          image: ghcr.io/marco-simoncini/karl-hyperdensity-controller:reference-only
          env:
            - name: GENERAL_PRODUCTION_AUTO_ALLOWED
              value: "false"
            - name: PRODUCTION_AUTO_WITH_POLICY
              value: "false"
            - name: STATE_STORE_TYPE
              value: kubernetes_configmap
