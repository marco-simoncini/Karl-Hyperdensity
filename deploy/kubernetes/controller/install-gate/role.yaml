apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hyperdensity-controller
  namespace: karl-system
  labels:
    hyperdensity.karl.io/component: controller
    hyperdensity.karl.io/install-gate: production-candidate
    hyperdensity.karl.io/general-production-auto-allowed: "false"
    hyperdensity.karl.io/production-auto-with-policy: "false"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["hyperdensity.karl.io"]
    resources: ["hyperdensitycontrollerstates"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
