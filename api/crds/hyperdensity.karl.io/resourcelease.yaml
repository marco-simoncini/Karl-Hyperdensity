apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourceleases.hyperdensity.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: hyperdensity.karl.io
  scope: Namespaced
  names:
    plural: resourceleases
    singular: resourcelease
    kind: ResourceLease
    shortNames:
      - krlease
    categories:
      - all
      - karl
      - karl-hyperdensity
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - donor
                - receiver
                - resource
                - mode
              properties:
                donor:
                  type: object
                  required:
                    - kind
                    - name
                  properties:
                    apiGroup:
                      type: string
                    kind:
                      type: string
                      enum:
                        - Shell
                        - Cell
                    namespace:
                      type: string
                    name:
                      type: string
                receiver:
                  type: object
                  required:
                    - kind
                    - name
                  properties:
                    apiGroup:
                      type: string
                    kind:
                      type: string
                      enum:
                        - Shell
                        - Cell
                    namespace:
                      type: string
                    name:
                      type: string
                resource:
                  type: string
                  enum:
                    - cpu
                    - memory
                    - disk
                    - network
                    - gpu
                amount:
                  description: Scalar or structured amount (refined in later contract revisions).
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                mode:
                  type: string
                durationSeconds:
                  type: integer
                  format: int64
                  minimum: 0
                ttlSeconds:
                  type: integer
                  format: int64
                  minimum: 0
                rollbackPlanRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                rollbackRequired:
                  type: boolean
                verificationHooks:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                noRestart:
                  description: Intent only; KHR must reconcile against ResourcePort truth.
                  type: boolean
                guestVisible:
                  type: boolean
                telemetryConvergedRequired:
                  description: When true, lease cannot complete until telemetry gates pass.
                  type: boolean
                dryRunOnly:
                  description: If true, Grande Padre must never promote to execution (simulation / evidence only).
                  type: boolean
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
