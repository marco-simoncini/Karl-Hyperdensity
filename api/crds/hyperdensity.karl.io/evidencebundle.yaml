apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: evidencebundles.hyperdensity.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: hyperdensity.karl.io
  scope: Namespaced
  names:
    plural: evidencebundles
    singular: evidencebundle
    kind: EvidenceBundle
    shortNames:
      - krbundle
    categories:
      - all
      - karl
      - karl-hyperdensity
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - agentId
                - sourceMode
                - bundleSha256
                - bundleBytes
                - signingMode
                - signaturePresent
                - collectedAt
                - confidence
                - readyForGrandePadre
                - blockedReasons
                - warnings
              properties:
                artifactId:
                  description: Optional operator-supplied artifact identifier (may be empty string).
                  type: string
                agentId:
                  type: string
                sourceMode:
                  description: Source pipeline that produced the bundle (e.g. collect-evidence).
                  type: string
                bundleSha256:
                  description: Lowercase hex SHA-256 over canonical bundle JSON bytes.
                  type: string
                  pattern: '^[0-9a-f]{64}$'
                bundleBytes:
                  type: integer
                  format: int64
                  minimum: 0
                signingMode:
                  type: string
                signaturePresent:
                  type: boolean
                collectedAt:
                  type: string
                  format: date-time
                cellRef:
                  type: object
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    namespace:
                      type: string
                    name:
                      type: string
                confidence:
                  type: string
                readyForGrandePadre:
                  type: boolean
                blockedReasons:
                  type: array
                  items:
                    type: string
                warnings:
                  type: array
                  items:
                    type: string
                manifestRef:
                  description: Reference to the artifact manifest object or blob (optional).
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                storageRef:
                  description: Reference to persisted bundle bytes (optional).
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
