apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourcefutures.hyperdensity.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: hyperdensity.karl.io
  scope: Namespaced
  names:
    plural: resourcefutures
    singular: resourcefuture
    kind: ResourceFuture
    shortNames:
      - krfuture
    categories:
      - all
      - karl
      - karl-hyperdensity
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - leaseTemplate
              properties:
                leaseTemplate:
                  description: >
                    Template for a ResourceLease to materialize when activation rules fire.
                    Field shapes mirror resourceleases.hyperdensity.karl.io/v1alpha1 .spec (contract evolution may tighten this).
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                activation:
                  description: When the future may convert to a concrete ResourceLease proposal.
                  type: object
                  properties:
                    schedule:
                      type: object
                      properties:
                        notBefore:
                          type: string
                          format: date-time
                        notAfter:
                          type: string
                          format: date-time
                    predicates:
                      type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - resourcePressure
                              - sloRisk
                              - costBand
                              - maintenanceWindow
                              - manualApproval
                          params:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                priority:
                  type: integer
                  format: int32
                prevalidationRequired:
                  description: When true, Hyperdensity must run dry-run gates before scheduling activation.
                  type: boolean
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
