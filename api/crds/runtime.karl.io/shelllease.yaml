apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: shellleases.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: runtime.karl.io
  scope: Namespaced
  names:
    plural: shellleases
    singular: shelllease
    kind: ShellLease
    shortNames:
      - kshlease
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - shellRef
              properties:
                shellRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                shellPoolRef:
                  type: object
                  properties:
                    name:
                      type: string
                holder:
                  description: Subject bound to the lease (user, group, service identity).
                  type: object
                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                    apiGroup:
                      type: string
                slaClass:
                  type: string
                costPolicyRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                ttlSeconds:
                  type: integer
                  format: int64
                  minimum: 0
                gatewayRouteRefs:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                windowsAppRef:
                  type: object
                  properties:
                    name:
                      type: string
                constraints:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
