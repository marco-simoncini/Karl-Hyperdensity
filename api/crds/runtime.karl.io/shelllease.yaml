# Contract-only CRD (KHR-E access foundation). No controller ships with this definition.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: shellleases.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1-shell-access-foundation
spec:
  group: runtime.karl.io
  scope: Namespaced
  names:
    plural: shellleases
    singular: shelllease
    kind: ShellLease
    shortNames:
      - kshlease
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Shell
          type: string
          jsonPath: .spec.shellRef.name
        - name: Mode
          type: string
          jsonPath: .spec.leaseMode
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - shellRef
                - leaseMode
              properties:
                shellRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                userRef:
                  type: string
                tenant:
                  type: string
                leaseMode:
                  type: string
                  enum:
                    - ephemeral
                    - persistent
                    - scheduled
                accessProfile:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
                shellPoolRef:
                  type: object
                  properties:
                    name:
                      type: string
                holder:
                  description: Deprecated; use userRef + tenant (KHR-E).
                  type: object
                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                    apiGroup:
                      type: string
                slaClass:
                  type: string
                costPolicyRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                ttlSeconds:
                  type: integer
                  format: int64
                  minimum: 0
                gatewayRouteRefs:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                windowsAppRef:
                  type: object
                  properties:
                    name:
                      type: string
                constraints:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Active
                    - Expired
                    - Revoked
                    - Observed
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
              x-kubernetes-preserve-unknown-fields: true
