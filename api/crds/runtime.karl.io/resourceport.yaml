apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourceports.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1-observation
spec:
  group: runtime.karl.io
  scope: Cluster
  names:
    plural: resourceports
    singular: resourceport
    kind: ResourcePort
    shortNames:
      - krport
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - ports
              properties:
                provider:
                  description: Runtime provider binding for observation (KHR-C).
                  type: string
                shellRef:
                  type: string
                cellRef:
                  type: string
                capabilities:
                  type: array
                  items:
                    type: string
                hotplug:
                  type: object
                  properties:
                    cpu:
                      type: boolean
                    memory:
                      type: boolean
                    disk:
                      type: boolean
                    network:
                      type: boolean
                constraints:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                description:
                  type: string
                appliesToRuntimeProviderIds:
                  type: array
                  items:
                    type: string
                ports:
                  description: Capability truth matrix for Hyperdensity prevalidation.
                  type: object
                  required:
                    - cpu
                    - memory
                  properties:
                    cpu:
                      type: object
                      required:
                        - modes
                      properties:
                        modes:
                          type: array
                          items:
                            type: string
                            enum:
                              - hotAdd
                              - envelope
                              - static
                    memory:
                      type: object
                      required:
                        - modes
                      properties:
                        modes:
                          type: array
                          items:
                            type: string
                            enum:
                              - hotAdd
                              - balloon
                              - virtioMem
                              - envelope
                              - static
                    disk:
                      type: object
                      properties:
                        modes:
                          type: array
                          items:
                            type: string
                            enum:
                              - hotplug
                              - static
                    network:
                      type: object
                      properties:
                        modes:
                          type: array
                          items:
                            type: string
                            enum:
                              - hotplug
                              - static
                    gpu:
                      type: object
                      properties:
                        modes:
                          type: array
                          items:
                            type: string
                            enum:
                              - coldAttach
                              - warmAttach
                              - liveIfSupported
                notes:
                  description: Human-readable limits; not a substitute for enforcement.
                  type: string
            status:
              type: object
              properties:
                observedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                      reason:
                        type: string
                      message:
                        type: string
                    x-kubernetes-preserve-unknown-fields: true
              x-kubernetes-preserve-unknown-fields: true
