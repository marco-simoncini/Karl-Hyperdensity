apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: shellpools.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: runtime.karl.io
  scope: Cluster
  names:
    plural: shellpools
    singular: shellpool
    kind: ShellPool
    shortNames:
      - kshpool
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - selector
              properties:
                description:
                  type: string
                selector:
                  description: Label selector matching Hosts or Nodes (KHR-defined semantics in later sprints).
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                allowedShellClassNames:
                  type: array
                  items:
                    type: string
                taints:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string
                      effect:
                        type: string
                capacitySignals:
                  description: Opaque pool telemetry hooks for Hyperdensity (contract only).
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
