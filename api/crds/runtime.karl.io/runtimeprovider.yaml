apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runtimeproviders.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: runtime.karl.io
  scope: Cluster
  names:
    plural: runtimeproviders
    singular: runtimeprovider
    kind: RuntimeProvider
    shortNames:
      - krtprov
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - id
                - driver
              properties:
                id:
                  description: Stable provider id (e.g. kubevirt.legacy.v1, linux.pod.v1).
                  type: string
                displayName:
                  type: string
                driver:
                  description: Implementation driver classification.
                  type: string
                  enum:
                    - kubevirt-legacy
                    - kubernetes-pod
                    - linux-systemd
                    - windows-host-agent
                    - cloud-adaptive
                    - vm-native-candidate
                supportedShellClassIds:
                  type: array
                  items:
                    type: string
                defaultResourcePortProfileRef:
                  type: object
                  properties:
                    name:
                      type: string
                execContractVersion:
                  description: Version of the KHR apply / evidence contract supported.
                  type: string
                config:
                  description: Opaque provider configuration (no runtime apply in Sprint 2).
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
