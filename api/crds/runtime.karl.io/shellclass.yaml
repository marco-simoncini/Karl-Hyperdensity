apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: shellclasses.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1-shell-cell-foundation
spec:
  group: runtime.karl.io
  scope: Cluster
  names:
    plural: shellclasses
    singular: shellclass
    kind: ShellClass
    shortNames:
      - kshclass
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - id
                - complianceFamily
                - defaultProviderBinding
                - defaultRuntimeClass
              properties:
                id:
                  type: string
                displayName:
                  type: string
                description:
                  type: string
                complianceFamily:
                  type: string
                  enum:
                    - linux.cgroup.envelope
                    - linux.kubevirt.legacy.vm
                    - windows.session
                    - windows.app
                    - vm.native.candidate
                    - cloud.adaptive
                defaultProviderBinding:
                  type: string
                defaultRuntimeClass:
                  type: string
                defaultResources:
                  type: object
                  properties:
                    cpu:
                      type: object
                      properties:
                        request:
                          type: string
                        limit:
                          type: string
                    memory:
                      type: object
                      properties:
                        request:
                          type: string
                        limit:
                          type: string
                defaultNetworkRefs:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      ref:
                        type: string
                defaultStorageRefs:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      ref:
                        type: string
                      mode:
                        type: string
                supportedRuntimeProviders:
                  type: array
                  items:
                    type: string
                defaultResourcePortProfileRef:
                  type: object
                  properties:
                    name:
                      type: string
                uxHints:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Ready
                    - Degraded
                    - Observed
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
