apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: shellclasses.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: runtime.karl.io
  scope: Cluster
  names:
    plural: shellclasses
    singular: shellclass
    kind: ShellClass
    shortNames:
      - kshclass
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - id
                - complianceFamily
              properties:
                id:
                  description: Stable program identifier (e.g. linux.workspace.v1).
                  type: string
                  pattern: ^[a-z0-9][a-z0-9._-]*[a-z0-9]$
                displayName:
                  type: string
                description:
                  type: string
                complianceFamily:
                  description: Evidence / compliance lane for Hyperdensity and KHR.
                  type: string
                  enum:
                    - linux.cgroup.envelope
                    - linux.kubevirt.legacy.vm
                    - windows.session
                    - windows.app
                    - vm.native.candidate
                    - cloud.adaptive
                supportedRuntimeProviders:
                  type: array
                  items:
                    type: string
                defaultResourcePortProfileRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                uxHints:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
