apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hosts.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1-host-registration
spec:
  group: runtime.karl.io
  scope: Cluster
  names:
    plural: hosts
    singular: host
    kind: Host
    shortNames:
      - khost
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Mode
          type: string
          jsonPath: .spec.runtimeMode
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Safety
          type: string
          jsonPath: .status.safetyMode
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - hostId
                - nodeName
                - provider
                - runtimeMode
              properties:
                hostId:
                  description: Stable host identity (KHR agent / registration).
                  type: string
                nodeName:
                  description: Kubernetes node name this host maps to.
                  type: string
                provider:
                  description: Runtime provider binding (e.g. khr.native).
                  type: string
                runtimeMode:
                  description: Host runtime posture on the cluster.
                  type: string
                  enum:
                    - sandbox
                    - preview
                    - disabled
                labels:
                  type: object
                  additionalProperties:
                    type: string
                taints:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string
                      effect:
                        type: string
                kubernetesNodeName:
                  description: Deprecated alias for nodeName (compatibility).
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                capabilities:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                observedResourcePorts:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                lastHeartbeatTime:
                  type: string
                  format: date-time
                runtimeVersion:
                  type: string
                safetyMode:
                  type: string
                  enum:
                    - sandbox
                    - preview
                    - production-blocked
