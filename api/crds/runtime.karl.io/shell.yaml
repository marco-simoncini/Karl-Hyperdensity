# Contract-only CRD (KHR-D foundation). No controller ships with this definition.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: shells.runtime.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1-shell-cell-foundation
spec:
  group: runtime.karl.io
  scope: Namespaced
  names:
    plural: shells
    singular: shell
    kind: Shell
    shortNames:
      - ksh
    categories:
      - all
      - karl
      - karl-runtime
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Class
          type: string
          jsonPath: .spec.shellClassRef.name
        - name: Provider
          type: string
          jsonPath: .spec.providerBinding
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - shellClassRef
                - providerBinding
                - runtimeClass
              properties:
                shellClassRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                providerBinding:
                  type: string
                runtimeClass:
                  type: string
                owner:
                  type: object
                  properties:
                    user:
                      type: string
                    tenant:
                      type: string
                resources:
                  type: object
                  properties:
                    cpu:
                      type: object
                      properties:
                        request:
                          type: string
                        limit:
                          type: string
                    memory:
                      type: object
                      properties:
                        request:
                          type: string
                        limit:
                          type: string
                networkRefs:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - ref
                    properties:
                      name:
                        type: string
                      ref:
                        type: string
                storageRefs:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - ref
                    properties:
                      name:
                        type: string
                      ref:
                        type: string
                      mode:
                        type: string
                shellPoolRef:
                  type: object
                  properties:
                    name:
                      type: string
                displayName:
                  type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
                resourceProfile:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                runtimePreference:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                resourcePortProfileRef:
                  type: object
                  properties:
                    name:
                      type: string
                gatewayRouteRefs:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                windowsAppRef:
                  type: object
                  properties:
                    name:
                      type: string
                kubeVirtLegacy:
                  type: object
                  properties:
                    virtualMachineName:
                      type: string
                    virtualMachineNamespace:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Provisioning
                    - Ready
                    - Degraded
                    - Terminating
                    - Observed
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                observedResourcePorts:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                observedResourceLeases:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
