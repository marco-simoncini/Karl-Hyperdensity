# Contract-only CRD (KHR-E access foundation). API group gateway.karl.io (rdp-GW alignment).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewayroutes.gateway.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1-shell-access-foundation
spec:
  group: gateway.karl.io
  scope: Namespaced
  names:
    plural: gatewayroutes
    singular: gatewayroute
    kind: GatewayRoute
    shortNames:
      - kgwrt
    categories:
      - all
      - karl
      - karl-gateway
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Protocol
          type: string
          jsonPath: .spec.protocol
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - protocol
              properties:
                shellLeaseRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                protocol:
                  type: string
                  enum:
                    - rdp
                    - rdp-remoteapp
                    - web
                    - ssh
                targetRef:
                  type: string
                gateway:
                  type: string
                policyRefs:
                  type: array
                  items:
                    type: string
                tokenRef:
                  type: string
                shellRef:
                  type: object
                  properties:
                    name:
                      type: string
                gatewayClass:
                  type: string
                  enum:
                    - karl.rdpgw.v1
                    - karl.web.v1
                    - karl.ssmLike.v1
                displayName:
                  type: string
                rdp:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                tokenPolicy:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Ready
                    - Failed
                    - Revoked
                    - Observed
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
              x-kubernetes-preserve-unknown-fields: true
