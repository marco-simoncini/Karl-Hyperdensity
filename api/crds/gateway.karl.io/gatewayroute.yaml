apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewayroutes.gateway.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: gateway.karl.io
  scope: Namespaced
  names:
    plural: gatewayroutes
    singular: gatewayroute
    kind: GatewayRoute
    shortNames:
      - kgwrt
    categories:
      - all
      - karl
      - karl-gateway
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - gatewayClass
              properties:
                shellRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                gatewayClass:
                  type: string
                  enum:
                    - karl.rdpgw.v1
                    - karl.web.v1
                    - karl.ssmLike.v1
                displayName:
                  type: string
                rdp:
                  description: Parameters aligned with rdp-GW / MS RDP file model (contract only).
                  type: object
                  properties:
                    screenMode:
                      type: integer
                    useMultimon:
                      type: boolean
                    alternateShell:
                      type: string
                    remoteApplicationMode:
                      type: boolean
                    remoteApplicationProgram:
                      type: string
                    remoteApplicationName:
                      type: string
                    remoteApplicationCmdLine:
                      type: string
                tokenPolicy:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
