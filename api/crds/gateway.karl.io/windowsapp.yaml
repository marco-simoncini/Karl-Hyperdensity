apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: windowsapps.gateway.karl.io
  labels:
    karl.io/contract-track: khr-v1alpha1
spec:
  group: gateway.karl.io
  scope: Namespaced
  names:
    plural: windowsapps
    singular: windowsapp
    kind: WindowsApp
    shortNames:
      - kwinapp
    categories:
      - all
      - karl
      - karl-gateway
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - displayName
              properties:
                displayName:
                  type: string
                description:
                  type: string
                identifiers:
                  type: object
                  properties:
                    productCode:
                      type: string
                    publisher:
                      type: string
                    version:
                      type: string
                remoteApp:
                  description: RemoteApp / RDP gateway mapping hints (rdp-GW field alignment).
                  type: object
                  properties:
                    remoteApplicationProgram:
                      type: string
                    remoteApplicationName:
                      type: string
                    remoteApplicationCmdLine:
                      type: string
                    remoteApplicationIcon:
                      type: string
                installEvidence:
                  description: Attestation hooks (Inventory / Migration Factory alignment — contract only).
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                constraints:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
